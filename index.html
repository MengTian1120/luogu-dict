<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#0f2c3f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>洛谷词典 · 社区语言速查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #eef2f7;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* ========= 侧边栏 - 移动优先优化 ========= */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #0f2c3f 0%, #123e56 100%);
            color: #e6f3ff;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 2px 0 20px rgba(0,0,0,0.15);
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        /* 侧边栏遮罩层 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 1.2rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            position: sticky;
            top: 0;
            background: inherit;
            z-index: 2;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dict-list {
            flex: 1;
            padding: 0.75rem 0.5rem;
            list-style: none;
        }

        .dict-item {
            margin: 0.2rem 0.5rem;
            border-radius: 0.9rem;
            transition: all 0.2s;
        }

        .dict-item button {
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #d9ecff;
            cursor: pointer;
            border-radius: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
            touch-action: manipulation;
        }

        .dict-item button:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.98);
        }

        .dict-item.active button {
            background: #2c7da0;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .dict-name {
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
        }

        .dict-count {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* ========= 右侧主内容 ========= */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f8fafd;
            width: 100%;
        }

        .top-bar {
            background: white;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e2eaf1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 5;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }

        .menu-toggle {
            background: #eef3fc;
            border: none;
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
            transition: 0.1s;
            color: #136b96;
        }

        .menu-toggle:active {
            background: #e2e9f2;
            transform: scale(0.96);
        }

        .search-section {
            flex: 2;
            min-width: 160px;
            display: flex;
            gap: 8px;
            position: relative;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f2f6fa;
            border: 1px solid #dce5ef;
            border-radius: 40px;
            padding: 0.25rem 0.9rem;
            transition: 0.2s;
        }

        .search-box:focus-within {
            background: white;
            border-color: #2c8fbb;
            box-shadow: 0 0 0 3px rgba(44,143,187,0.1);
        }

        .search-box span {
            color: #7f99b3;
            margin-right: 6px;
            font-size: 0.9rem;
        }

        #searchInput {
            border: none;
            background: transparent;
            padding: 0.6rem 0;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }

        .clear-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #8aa4bf;
            padding: 0 5px;
            transition: color 0.2s;
            touch-action: manipulation;
        }
        .clear-btn:active {
            color: #e05a5a;
        }

        .search-hint {
            display: none;
        }

        /* GitHub 链接 - 移动端图标模式 */
        .github-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #24292e;
            color: white;
            padding: 8px;
            border-radius: 40px;
            text-decoration: none;
            transition: 0.2s;
            width: 36px;
            height: 36px;
        }
        .github-link span {
            display: none;
        }
        .github-link svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        .github-link:active {
            background: #0366d6;
            transform: scale(0.95);
        }

        .info-area {
            background: white;
            margin: 0.75rem 1rem 0 1rem;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.8rem;
            border: 1px solid #eaf0f6;
        }

        .current-dict-name {
            background: #eef2fa;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-weight: 600;
            color: #136b96;
            font-size: 0.8rem;
        }

        .stats {
            color: #54738f;
            font-size: 0.75rem;
        }

        .dict-content {
            padding: 0.75rem 1rem 1.5rem 1rem;
            flex: 1;
        }

        .dict-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.9rem;
        }

        /* 卡片移动端优化 */
        .card {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e7eef5;
            transition: 0.15s;
            overflow: hidden;
            touch-action: manipulation;
        }

        .card:active {
            transform: scale(0.99);
            background: #fefefe;
        }

        .abbr-area {
            background: #fafdff;
            padding: 0.85rem 1rem 0.5rem 1rem;
            border-bottom: 2px solid #eef3fc;
        }

        .abbr {
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #136b96;
            word-break: break-word;
        }

        .meaning-area {
            padding: 0.85rem 1rem 1rem 1rem;
        }

        .meaning {
            font-size: 0.88rem;
            line-height: 1.45;
            color: #2b4c6e;
        }

        mark {
            background: #ffecb3;
            color: #b55a0c;
            border-radius: 10px;
            padding: 0 2px;
        }

        .empty-message, .error-message, .loading-message {
            text-align: center;
            padding: 2rem 1rem;
            background: white;
            border-radius: 1rem;
            color: #6d8aac;
            border: 1px dashed #cbdae9;
            font-size: 0.9rem;
        }

        .skeleton-card {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e7eef5;
            padding: 0.85rem 1rem;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .skeleton-abbr {
            height: 1.5rem;
            width: 35%;
            background: #e2e8f0;
            border-radius: 16px;
            margin-bottom: 0.8rem;
        }
        .skeleton-line {
            height: 0.85rem;
            background: #e2e8f0;
            border-radius: 10px;
            margin-top: 0.5rem;
            width: 90%;
        }
        .skeleton-line.short {
            width: 60%;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .footer {
            background: white;
            border-top: 1px solid #e2eaf1;
            padding: 0.7rem 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6c8eab;
        }
        .footer a {
            color: #1c6e8f;
            text-decoration: none;
        }

        /* 平板适配 */
        @media (min-width: 600px) {
            .dict-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 1rem;
            }
            .top-bar {
                padding: 0.9rem 1.5rem;
            }
            .dict-content {
                padding: 1rem 1.5rem 1.5rem;
            }
        }

        /* 桌面样式：侧边栏常驻 */
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0) !important;
                width: 280px;
                box-shadow: 2px 0 12px rgba(0,0,0,0.08);
            }
            .sidebar-overlay {
                display: none;
            }
            .menu-toggle {
                display: none;
            }
            .github-link {
                width: auto;
                padding: 6px 14px;
            }
            .github-link span {
                display: inline;
            }
            .github-link svg {
                width: 18px;
                height: 18px;
            }
            .top-bar {
                padding: 1rem 1.5rem;
            }
        }

        /* 滚动条美化 */
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
        
        .main-content::-webkit-scrollbar {
            width: 4px;
        }
        .main-content::-webkit-scrollbar-track {
            background: #eef2f7;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #cbdae9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📚 洛谷词典</h2>
        </div>
        <ul class="dict-list" id="dictList">
            <li style="padding: 1rem; text-align:center; color:#9ab3c7;">加载词典列表...</li>
        </ul>
    </aside>

    <div class="main-content">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggleBtn" aria-label="菜单">☰ 词典</button>
            <div class="search-section">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索缩写或含义..." autocomplete="off" enterkeyhint="search">
                    <button class="clear-btn" id="clearSearchBtn" aria-label="清除">✖</button>
                </div>
            </div>
            <a href="https://github.com/MengTian1120/luogu-dict" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="18" height="18">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                <span>GitHub</span>
            </a>
        </div>

        <div class="info-area">
            <div><span class="current-dict-name" id="currentDictDisplay">-</span></div>
            <div class="stats" id="statsInfo">📋 未选择词典</div>
        </div>

        <div class="dict-content" id="dictContent">
            <div class="loading-message">✨ 请从左侧选择一个词典</div>
        </div>

        <div class="footer">
            <span>📖 洛谷词典 · 由 </span>
            <a href="https://www.luogu.com.cn/user/2119974" target="_blank" rel="noopener noreferrer">@MengTian1120</a>
            <span> 维护 · 内容来源于社区，仅供学习交流</span>
        </div>
    </div>
</div>

<script>
    // ---------- 全局配置 ----------
    const DICT_DIR = 'dicts/';
    const DICT_LIST_FILE = 'dicts.txt';
    const FETCH_TIMEOUT = 8000;
    const SEARCH_DEBOUNCE_DELAY = 200;
    
    let dictFileNames = [];
    let currentDictIndex = 0;
    let currentEntries = [];
    let currentSearchKeyword = '';
    let searchDebounceTimer = null;
    let abortController = null;
    
    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const dictListEl = document.getElementById('dictList');
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const dictContent = document.getElementById('dictContent');
    const currentDictDisplaySpan = document.getElementById('currentDictDisplay');
    const statsInfoSpan = document.getElementById('statsInfo');
    
    // ---------- 辅助函数 ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function highlightText(text, keyword) {
        if (!keyword || keyword.trim() === '') return escapeHtml(text);
        const kw = escapeHtml(keyword).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (kw === '') return escapeHtml(text);
        const regex = new RegExp(`(${kw})`, 'gi');
        return escapeHtml(text).replace(regex, `<mark>$1</mark>`);
    }
    
    function parseTxtToEntries(text, fileNameForError = '') {
        const lines = text.split(/\r?\n/);
        const entries = [];
        for (let line of lines) {
            line = line.trim();
            if (line === '' || line.startsWith('#')) continue;
            const sepIndex = line.indexOf('|');
            if (sepIndex === -1) continue;
            let abbr = line.substring(0, sepIndex).trim();
            let meaning = line.substring(sepIndex + 1).trim();
            if (abbr === '' || meaning === '') continue;
            entries.push({ abbr, meaning });
        }
        return entries;
    }
    
    function getDisplayNameFromFile(fileName) {
        if (fileName.toLowerCase().endsWith('.txt')) {
            return fileName.slice(0, -4);
        }
        return fileName;
    }
    
    function sortEntriesByRelevance(entries, keyword) {
        if (!keyword.trim()) return entries;
        const kw = keyword.toLowerCase().trim();
        return [...entries].sort((a, b) => {
            const aAbbrLow = a.abbr.toLowerCase();
            const bAbbrLow = b.abbr.toLowerCase();
            const aMeaningLow = a.meaning.toLowerCase();
            const bMeaningLow = b.meaning.toLowerCase();
            const aAbbrMatch = aAbbrLow.includes(kw);
            const bAbbrMatch = bAbbrLow.includes(kw);
            if (aAbbrMatch !== bAbbrMatch) return aAbbrMatch ? -1 : 1;
            if (aAbbrMatch && bAbbrMatch) {
                const aExact = aAbbrLow === kw;
                const bExact = bAbbrLow === kw;
                if (aExact !== bExact) return aExact ? -1 : 1;
                const aIdx = aAbbrLow.indexOf(kw);
                const bIdx = bAbbrLow.indexOf(kw);
                if (aIdx !== bIdx) return aIdx - bIdx;
                return a.abbr.length - b.abbr.length;
            }
            const aMatch = aMeaningLow.includes(kw);
            const bMatch = bMeaningLow.includes(kw);
            if (aMatch !== bMatch) return aMatch ? -1 : 1;
            const aMeaningIdx = aMeaningLow.indexOf(kw);
            const bMeaningIdx = bMeaningLow.indexOf(kw);
            if (aMeaningIdx !== bMeaningIdx) return aMeaningIdx - bMeaningIdx;
            return a.abbr.localeCompare(b.abbr);
        });
    }
    
    function showSkeleton(count = 6) {
        let skeletons = '';
        for (let i = 0; i < count; i++) {
            skeletons += `<div class="skeleton-card"><div class="skeleton-abbr"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>`;
        }
        dictContent.innerHTML = `<div class="dict-grid">${skeletons}</div>`;
    }
    
    async function fetchWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            const response = await fetch(url, { signal: controller.signal, cache: 'no-store' });
            clearTimeout(timeoutId);
            return response;
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }
    
    function renderSidebar() {
        if (!dictFileNames.length) {
            dictListEl.innerHTML = `<li style="padding: 1rem; text-align:center; color:#ffb4a2;">⚠️ 无可用词典<br><span style="font-size:0.7rem;">请确保 dicts.txt 存在</span></li>`;
            return;
        }
        const itemsHtml = dictFileNames.map((fileName, idx) => {
            const displayName = getDisplayNameFromFile(fileName);
            const activeClass = (idx === currentDictIndex) ? 'active' : '';
            return `<li class="dict-item ${activeClass}" data-index="${idx}"><button><span class="dict-name">📖 ${escapeHtml(displayName)}</span><span class="dict-count" id="count-${idx}">?</span></button></li>`;
        }).join('');
        dictListEl.innerHTML = itemsHtml;
        
        document.querySelectorAll('.dict-item').forEach(item => {
            const btn = item.querySelector('button');
            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(item.getAttribute('data-index'), 10);
                    if (!isNaN(idx) && idx !== currentDictIndex) {
                        switchToDict(idx);
                        closeSidebar();
                    }
                });
            }
        });
    }
    
    function updateSidebarActive() {
        document.querySelectorAll('.dict-item').forEach((item) => {
            const idxAttr = parseInt(item.getAttribute('data-index'), 10);
            if (idxAttr === currentDictIndex) item.classList.add('active');
            else item.classList.remove('active');
        });
    }
    
    function updateSidebarCount(index, count) {
        const countSpan = document.getElementById(`count-${index}`);
        if (countSpan) countSpan.innerText = count;
    }
    
    async function loadDictionary(index) {
        if (!dictFileNames.length || index >= dictFileNames.length || index < 0) {
            currentEntries = [];
            renderContent();
            return false;
        }
        if (abortController) abortController.abort();
        abortController = new AbortController();
        
        const fileName = dictFileNames[index];
        const filePath = DICT_DIR + fileName;
        const displayName = getDisplayNameFromFile(fileName);
        currentDictDisplaySpan.innerText = displayName;
        statsInfoSpan.innerHTML = '⏳ 加载中...';
        showSkeleton(8);
        
        try {
            const response = await fetchWithTimeout(filePath, FETCH_TIMEOUT);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            const entries = parseTxtToEntries(text, fileName);
            if (entries.length === 0) throw new Error('无有效条目');
            currentEntries = entries;
            statsInfoSpan.innerHTML = `✅ 共 ${currentEntries.length} 条`;
            updateSidebarCount(index, currentEntries.length);
            renderContent();
            return true;
        } catch (err) {
            currentEntries = [];
            statsInfoSpan.innerHTML = `❌ 加载失败`;
            updateSidebarCount(index, '!');
            dictContent.innerHTML = `<div class="error-message">❌ 无法加载 “${escapeHtml(displayName)}”<br><span style="font-size:0.8rem;">${escapeHtml(err.message)}</span></div>`;
            return false;
        } finally {
            if (abortController && !abortController.signal.aborted) abortController = null;
        }
    }
    
    function renderContent() {
        if (!dictFileNames.length) {
            dictContent.innerHTML = `<div class="empty-message">📭 未检测到词典列表<br>请确保 dicts.txt 文件存在</div>`;
            statsInfoSpan.innerHTML = '无词典配置';
            currentDictDisplaySpan.innerText = '无';
            return;
        }
        if (currentEntries.length === 0 && !dictContent.innerHTML.includes('加载失败')) {
            dictContent.innerHTML = `<div class="empty-message">📭 当前词典无有效条目</div>`;
            statsInfoSpan.innerHTML = `📚 共 0 条`;
            return;
        }
        if (currentEntries.length === 0) return;
        
        const keyword = currentSearchKeyword.trim();
        let filtered = currentEntries;
        if (keyword !== '') {
            const lowerKw = keyword.toLowerCase();
            filtered = currentEntries.filter(item => item.abbr.toLowerCase().includes(lowerKw) || item.meaning.toLowerCase().includes(lowerKw));
            filtered = sortEntriesByRelevance(filtered, keyword);
        }
        
        if (filtered.length === 0) {
            dictContent.innerHTML = `<div class="empty-message">🔎 没有找到 “${escapeHtml(keyword)}” 相关内容</div>`;
            statsInfoSpan.innerHTML = `📚 共 ${currentEntries.length} 条 | 显示 0 条`;
            return;
        }
        
        const gridHtml = filtered.map(item => `<div class="card"><div class="abbr-area"><div class="abbr">${highlightText(item.abbr, keyword)}</div></div><div class="meaning-area"><div class="meaning">${highlightText(item.meaning, keyword)}</div></div></div>`).join('');
        dictContent.innerHTML = `<div class="dict-grid">${gridHtml}</div>`;
        statsInfoSpan.innerHTML = `📚 共 ${currentEntries.length} 条 | 显示 ${filtered.length} 条`;
    }
    
    async function switchToDict(newIndex) {
        if (newIndex === currentDictIndex) return;
        currentDictIndex = newIndex;
        searchInput.value = '';
        currentSearchKeyword = '';
        updateSidebarActive();
        if (dictFileNames[currentDictIndex]) currentDictDisplaySpan.innerText = getDisplayNameFromFile(dictFileNames[currentDictIndex]);
        await loadDictionary(currentDictIndex);
    }
    
    async function loadDictList() {
        try {
            const response = await fetchWithTimeout(DICT_LIST_FILE, FETCH_TIMEOUT);
            if (!response.ok) throw new Error(`dicts.txt 不存在`);
            const text = await response.text();
            const lines = text.split(/\r?\n/);
            const files = [];
            for (let line of lines) {
                line = line.trim();
                if (line === '' || line.startsWith('#')) continue;
                files.push(line);
            }
            if (files.length === 0) throw new Error('dicts.txt 内容为空');
            dictFileNames = files;
            renderSidebar();
            currentDictIndex = 0;
            updateSidebarActive();
            if (dictFileNames.length) {
                currentDictDisplaySpan.innerText = getDisplayNameFromFile(dictFileNames[0]);
                await loadDictionary(0);
            }
        } catch (err) {
            dictFileNames = [];
            renderSidebar();
            dictContent.innerHTML = `<div class="error-message">❌ 无法读取 dicts.txt<br><span style="font-size:0.8rem;">${escapeHtml(err.message)}</span><br><br>💡 请确保根目录存在 dicts.txt 文件</div>`;
            statsInfoSpan.innerHTML = '列表缺失';
            currentDictDisplaySpan.innerText = '无';
        }
    }
    
    function onSearchInput() {
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => {
            currentSearchKeyword = searchInput.value;
            renderContent();
        }, SEARCH_DEBOUNCE_DELAY);
    }
    
    function resetSearch() {
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchInput.value = '';
        currentSearchKeyword = '';
        renderContent();
        searchInput.focus();
    }
    
    function openSidebar() {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeSidebar() {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function bindEvents() {
        searchInput.addEventListener('input', onSearchInput);
        clearSearchBtn.addEventListener('click', resetSearch);
        menuToggleBtn.addEventListener('click', openSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
        
        // 点击主内容区域关闭侧边栏（移动端）
        const mainContent = document.querySelector('.main-content');
        if (mainContent) {
            mainContent.addEventListener('touchstart', (e) => {
                if (sidebar.classList.contains('open')) closeSidebar();
            });
        }
        
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        
        // Ctrl+K / Cmd+K 聚焦搜索
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape' && document.activeElement === searchInput) {
                resetSearch();
            }
        });
    }
    
    async function init() {
        bindEvents();
        await loadDictList();
    }
    
    init();
</script>
</body>
</html>
