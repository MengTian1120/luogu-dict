<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>洛谷词典 · 社区语言速查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f7;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ========= 侧边栏 ========= */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f2c3f 0%, #123e56 100%);
            color: #e6f3ff;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.08);
            z-index: 10;
            overflow-y: auto;
            transition: transform 0.2s ease;
        }

        .sidebar-header {
            padding: 1.5rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dict-list {
            flex: 1;
            padding: 1rem 0.5rem;
            list-style: none;
        }

        .dict-item {
            margin: 0.3rem 0.5rem;
            border-radius: 1rem;
            transition: all 0.2s;
        }

        .dict-item button {
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #d9ecff;
            cursor: pointer;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }

        .dict-item button:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .dict-item.active button {
            background: #2c7da0;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .dict-name {
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
        }

        .dict-count {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 30px;
        }

        /* ========= 右侧主内容 ========= */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f8fafd;
        }

        .top-bar {
            background: white;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2eaf1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .search-section {
            flex: 2;
            min-width: 200px;
            display: flex;
            gap: 10px;
            position: relative;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f2f6fa;
            border: 1px solid #dce5ef;
            border-radius: 60px;
            padding: 0.3rem 1rem;
            transition: 0.2s;
        }

        .search-box:focus-within {
            background: white;
            border-color: #2c8fbb;
            box-shadow: 0 0 0 3px rgba(44,143,187,0.1);
        }

        .search-box span {
            color: #7f99b3;
            margin-right: 8px;
        }

        #searchInput {
            border: none;
            background: transparent;
            padding: 0.6rem 0;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }

        .clear-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #8aa4bf;
            padding: 0 6px;
            transition: color 0.2s;
        }
        .clear-btn:hover {
            color: #e05a5a;
        }

        /* 搜索快捷键提示 */
        .search-hint {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 30px;
            color: #5f7f9e;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 560px) {
            .search-hint { display: none; }
        }

        /* GitHub 链接按钮样式 */
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #24292e;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
            margin-left: auto;
        }
        .github-link:hover {
            background: #0366d6;
            transform: translateY(-1px);
        }
        .github-link svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .info-area {
            background: white;
            margin: 1rem 1.5rem 0 1.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.85rem;
            border: 1px solid #eaf0f6;
        }

        .current-dict-name {
            background: #eef2fa;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            color: #136b96;
        }

        .stats {
            color: #54738f;
        }

        .dict-content {
            padding: 1.2rem 1.5rem 2rem 1.5rem;
            flex: 1;
        }

        .dict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }

        /* 骨架屏卡片样式 */
        .skeleton-card {
            background: white;
            border-radius: 1.2rem;
            border: 1px solid #e7eef5;
            padding: 1rem 1.2rem;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .skeleton-abbr {
            height: 1.8rem;
            width: 40%;
            background: #e2e8f0;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        .skeleton-line {
            height: 1rem;
            background: #e2e8f0;
            border-radius: 12px;
            margin-top: 0.6rem;
            width: 90%;
        }
        .skeleton-line.short {
            width: 60%;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .card {
            background: white;
            border-radius: 1.2rem;
            border: 1px solid #e7eef5;
            transition: 0.2s;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 22px rgba(0,0,0,0.08);
            border-color: #caddf0;
        }

        .abbr-area {
            background: #fafdff;
            padding: 1rem 1.2rem 0.6rem 1.2rem;
            border-bottom: 2px solid #eef3fc;
        }

        .abbr {
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #136b96;
            word-break: break-word;
        }

        .meaning-area {
            padding: 1rem 1.2rem 1.2rem 1.2rem;
        }

        .meaning {
            font-size: 0.94rem;
            line-height: 1.45;
            color: #2b4c6e;
        }

        mark {
            background: #ffecb3;
            color: #b55a0c;
            border-radius: 12px;
            padding: 0 2px;
        }

        .empty-message, .error-message, .loading-message {
            text-align: center;
            padding: 3rem 1.5rem;
            background: white;
            border-radius: 1.5rem;
            color: #6d8aac;
            border: 1px dashed #cbdae9;
        }

        .menu-toggle {
            display: none;
            background: #eef3fc;
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .footer {
            background: white;
            border-top: 1px solid #e2eaf1;
            padding: 0.8rem 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6c8eab;
            margin-top: auto;
        }
        .footer a {
            color: #1c6e8f;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 720px) {
            .sidebar {
                width: 260px;
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 20;
                transform: translateX(-100%);
                transition: transform 0.2s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: inline-block;
            }
            .github-link span {
                display: none;
            }
            .github-link {
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📚 洛谷词典</h2>
        </div>
        <ul class="dict-list" id="dictList">
            <li style="padding: 1rem; text-align:center; color:#9ab3c7;">加载词典列表...</li>
        </ul>
    </aside>

    <div class="main-content">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggleBtn" aria-label="菜单">☰ 词典</button>
            <div class="search-section">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索缩写或含义..." autocomplete="off">
                    <button class="clear-btn" id="clearSearchBtn" aria-label="清除">✖</button>
                </div>
                <div class="search-hint">Ctrl+K / ⌘K</div>
            </div>
            <a href="https://github.com/MengTian1120/luogu-dict" target="_blank" rel="noopener noreferrer" class="github-link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="18" height="18">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                <span>GitHub</span>
            </a>
        </div>

        <div class="info-area">
            <div><span class="current-dict-name" id="currentDictDisplay">-</span></div>
            <div class="stats" id="statsInfo">📋 未选择词典</div>
        </div>

        <div class="dict-content" id="dictContent">
            <div class="loading-message">✨ 请从左侧选择一个词典</div>
        </div>

        <div class="footer">
            <span>📖 洛谷词典 · 由 </span>
            <a href="https://www.luogu.com.cn/user/2119974" target="_blank" rel="noopener noreferrer">@MengTian1120</a>
            <span> 维护 · 内容来源于社区，仅供学习交流，如有侵权或不当之处请联系删除。</span>
        </div>
    </div>
</div>

<script>
    // ---------- 全局配置 ----------
    const DICT_DIR = 'dicts/';
    const DICT_LIST_FILE = 'dicts.txt';
    const FETCH_TIMEOUT = 8000;          // 8秒超时
    const SEARCH_DEBOUNCE_DELAY = 200;    // 搜索防抖延迟(ms)
    
    let dictFileNames = [];          // 文件名列表 ['slang.txt', ...]
    let currentDictIndex = 0;
    let currentEntries = [];
    let currentSearchKeyword = '';
    let searchDebounceTimer = null;
    let abortController = null;       // 用于取消过时的 fetch
    
    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const dictListEl = document.getElementById('dictList');
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const dictContent = document.getElementById('dictContent');
    const currentDictDisplaySpan = document.getElementById('currentDictDisplay');
    const statsInfoSpan = document.getElementById('statsInfo');
    
    // ---------- 辅助函数 ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function highlightText(text, keyword) {
        if (!keyword || keyword.trim() === '') return escapeHtml(text);
        const kw = escapeHtml(keyword).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (kw === '') return escapeHtml(text);
        const regex = new RegExp(`(${kw})`, 'gi');
        return escapeHtml(text).replace(regex, `<mark>$1</mark>`);
    }
    
    function parseTxtToEntries(text, fileNameForError = '') {
        const lines = text.split(/\r?\n/);
        const entries = [];
        for (let line of lines) {
            line = line.trim();
            if (line === '' || line.startsWith('#')) continue;
            const sepIndex = line.indexOf('|');
            if (sepIndex === -1) {
                console.warn(`[词典解析] 跳过无效行: ${line.substring(0, 30)}... 文件: ${fileNameForError}`);
                continue;
            }
            let abbr = line.substring(0, sepIndex).trim();
            let meaning = line.substring(sepIndex + 1).trim();
            if (abbr === '' || meaning === '') continue;
            entries.push({ abbr, meaning });
        }
        return entries;
    }
    
    function getDisplayNameFromFile(fileName) {
        if (fileName.toLowerCase().endsWith('.txt')) {
            return fileName.slice(0, -4);
        }
        return fileName;
    }
    
    // 智能搜索排序：标题匹配优先
    function sortEntriesByRelevance(entries, keyword) {
        if (!keyword.trim()) return entries;
        const kw = keyword.toLowerCase().trim();
        return [...entries].sort((a, b) => {
            const aAbbrLow = a.abbr.toLowerCase();
            const bAbbrLow = b.abbr.toLowerCase();
            const aMeaningLow = a.meaning.toLowerCase();
            const bMeaningLow = b.meaning.toLowerCase();
            
            const aAbbrMatch = aAbbrLow.includes(kw);
            const bAbbrMatch = bAbbrLow.includes(kw);
            if (aAbbrMatch !== bAbbrMatch) return aAbbrMatch ? -1 : 1;
            if (aAbbrMatch && bAbbrMatch) {
                const aExact = aAbbrLow === kw;
                const bExact = bAbbrLow === kw;
                if (aExact !== bExact) return aExact ? -1 : 1;
                const aIdx = aAbbrLow.indexOf(kw);
                const bIdx = bAbbrLow.indexOf(kw);
                if (aIdx !== bIdx) return aIdx - bIdx;
                return a.abbr.length - b.abbr.length;
            }
            const aMatch = aMeaningLow.includes(kw);
            const bMatch = bMeaningLow.includes(kw);
            if (aMatch !== bMatch) return aMatch ? -1 : 1;
            const aMeaningIdx = aMeaningLow.indexOf(kw);
            const bMeaningIdx = bMeaningLow.indexOf(kw);
            if (aMeaningIdx !== bMeaningIdx) return aMeaningIdx - bMeaningIdx;
            return a.abbr.localeCompare(b.abbr);
        });
    }
    
    // 显示骨架屏
    function showSkeleton(count = 6) {
        let skeletons = '';
        for (let i = 0; i < count; i++) {
            skeletons += `
                <div class="skeleton-card">
                    <div class="skeleton-abbr"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            `;
        }
        dictContent.innerHTML = `<div class="dict-grid">${skeletons}</div>`;
    }
    
    // 带超时的 fetch
    async function fetchWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            const response = await fetch(url, { signal: controller.signal, cache: 'no-store' });
            clearTimeout(timeoutId);
            return response;
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }
    
    // 渲染侧边栏
    function renderSidebar() {
        if (!dictFileNames.length) {
            dictListEl.innerHTML = `<li style="padding: 1rem; text-align:center; color:#ffb4a2;">⚠️ 无可用词典<br><span style="font-size:0.7rem;">请确保 dicts.txt 文件存在且包含词典文件名</span></li>`;
            return;
        }
        const itemsHtml = dictFileNames.map((fileName, idx) => {
            const displayName = getDisplayNameFromFile(fileName);
            const activeClass = (idx === currentDictIndex) ? 'active' : '';
            return `
                <li class="dict-item ${activeClass}" data-index="${idx}">
                    <button class="dict-btn">
                        <span class="dict-name">📖 ${escapeHtml(displayName)}</span>
                        <span class="dict-count" id="count-${idx}">?</span>
                    </button>
                </li>
            `;
        }).join('');
        dictListEl.innerHTML = itemsHtml;
        
        document.querySelectorAll('.dict-item').forEach(item => {
            const btn = item.querySelector('.dict-btn');
            if (btn) {
                btn.addEventListener('click', () => {
                    const idx = parseInt(item.getAttribute('data-index'), 10);
                    if (!isNaN(idx) && idx !== currentDictIndex) {
                        switchToDict(idx);
                        // 移动端切换后自动关闭侧边栏
                        if (window.innerWidth <= 720 && sidebar.classList.contains('open')) {
                            sidebar.classList.remove('open');
                        }
                    }
                });
            }
        });
    }
    
    function updateSidebarActive() {
        document.querySelectorAll('.dict-item').forEach((item) => {
            const idxAttr = parseInt(item.getAttribute('data-index'), 10);
            if (idxAttr === currentDictIndex) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    function updateSidebarCount(index, count) {
        const countSpan = document.getElementById(`count-${index}`);
        if (countSpan) countSpan.innerText = count;
    }
    
    // 加载词典 (超时 + 友好错误)
    async function loadDictionary(index) {
        if (!dictFileNames.length || index >= dictFileNames.length || index < 0) {
            currentEntries = [];
            renderContent();
            return false;
        }
        
        // 取消之前的请求避免竞争
        if (abortController) {
            abortController.abort();
        }
        abortController = new AbortController();
        
        const fileName = dictFileNames[index];
        const filePath = DICT_DIR + fileName;
        const displayName = getDisplayNameFromFile(fileName);
        currentDictDisplaySpan.innerText = displayName;
        statsInfoSpan.innerHTML = '⏳ 加载中...';
        showSkeleton(8);
        
        try {
            const response = await fetchWithTimeout(filePath, FETCH_TIMEOUT);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            const entries = parseTxtToEntries(text, fileName);
            if (entries.length === 0) {
                currentEntries = [];
                statsInfoSpan.innerHTML = `⚠️ 无有效条目`;
                updateSidebarCount(index, 0);
                renderContent();
                return false;
            }
            currentEntries = entries;
            statsInfoSpan.innerHTML = `✅ 共 ${currentEntries.length} 条`;
            updateSidebarCount(index, currentEntries.length);
            renderContent();
            return true;
        } catch (err) {
            console.error(`加载词典失败 ${fileName}:`, err);
            let errorMsg = `无法加载词典 “${escapeHtml(displayName)}”`;
            if (err.name === 'AbortError') errorMsg = `加载超时或请求被取消`;
            else if (err.message.includes('HTTP')) errorMsg = `网络错误 (${err.message})`;
            else errorMsg = `加载失败: ${err.message || '未知错误'}`;
            
            currentEntries = [];
            statsInfoSpan.innerHTML = `❌ 加载失败`;
            updateSidebarCount(index, '!');
            dictContent.innerHTML = `<div class="error-message">❌ ${escapeHtml(errorMsg)}<br><span style="font-size:0.8rem;">💡 请检查网络或联系维护者，也可尝试刷新页面</span></div>`;
            return false;
        } finally {
            if (abortController && abortController.signal.aborted === false) {
                abortController = null;
            }
        }
    }
    
    // 渲染右侧内容 (带搜索)
    function renderContent() {
        if (!dictFileNames.length) {
            dictContent.innerHTML = `<div class="empty-message">📭 未检测到词典列表<br>请确保 dicts.txt 文件存在且配置正确</div>`;
            statsInfoSpan.innerHTML = '无词典配置';
            currentDictDisplaySpan.innerText = '无';
            return;
        }
        if (currentEntries.length === 0 && !dictContent.innerHTML.includes('加载失败')) {
            dictContent.innerHTML = `<div class="empty-message">📭 当前词典无有效条目</div>`;
            statsInfoSpan.innerHTML = `📚 共 0 条`;
            return;
        }
        if (currentEntries.length === 0) return;
        
        const keyword = currentSearchKeyword.trim();
        let filtered = currentEntries;
        if (keyword !== '') {
            const lowerKw = keyword.toLowerCase();
            filtered = currentEntries.filter(item => 
                item.abbr.toLowerCase().includes(lowerKw) || 
                item.meaning.toLowerCase().includes(lowerKw)
            );
            filtered = sortEntriesByRelevance(filtered, keyword);
        }
        
        if (filtered.length === 0) {
            dictContent.innerHTML = `<div class="empty-message">🔎 没有找到 “${escapeHtml(keyword)}” 相关内容</div>`;
            statsInfoSpan.innerHTML = `📚 共 ${currentEntries.length} 条 | 显示 0 条`;
            return;
        }
        
        const gridHtml = filtered.map(item => {
            const highAbbr = highlightText(item.abbr, keyword);
            const highMeaning = highlightText(item.meaning, keyword);
            return `
                <div class="card">
                    <div class="abbr-area">
                        <div class="abbr">${highAbbr}</div>
                    </div>
                    <div class="meaning-area">
                        <div class="meaning">${highMeaning}</div>
                    </div>
                </div>
            `;
        }).join('');
        dictContent.innerHTML = `<div class="dict-grid">${gridHtml}</div>`;
        statsInfoSpan.innerHTML = `📚 共 ${currentEntries.length} 条 | 显示 ${filtered.length} 条 · 匹配关键词 ${filtered.length}`;
    }
    
    // 切换词典
    async function switchToDict(newIndex) {
        if (newIndex === currentDictIndex) return;
        currentDictIndex = newIndex;
        // 清空搜索框
        searchInput.value = '';
        currentSearchKeyword = '';
        updateSidebarActive();
        if (dictFileNames[currentDictIndex]) {
            currentDictDisplaySpan.innerText = getDisplayNameFromFile(dictFileNames[currentDictIndex]);
        } else {
            currentDictDisplaySpan.innerText = '?';
        }
        await loadDictionary(currentDictIndex);
    }
    
    // 加载词典列表 (失败时显示错误，不提供降级词典)
    async function loadDictList() {
        try {
            const response = await fetchWithTimeout(DICT_LIST_FILE, FETCH_TIMEOUT);
            if (!response.ok) throw new Error(`dicts.txt 不存在 (HTTP ${response.status})`);
            const text = await response.text();
            const lines = text.split(/\r?\n/);
            const files = [];
            for (let line of lines) {
                line = line.trim();
                if (line === '' || line.startsWith('#')) continue;
                files.push(line);
            }
            if (files.length === 0) throw new Error('dicts.txt 内容为空，请添加至少一个词典文件名');
            dictFileNames = files;
            renderSidebar();
            currentDictIndex = 0;
            updateSidebarActive();
            if (dictFileNames.length) {
                currentDictDisplaySpan.innerText = getDisplayNameFromFile(dictFileNames[0]);
                await loadDictionary(0);
            }
        } catch (err) {
            console.error('加载 dicts.txt 失败:', err);
            dictFileNames = [];
            renderSidebar();
            dictContent.innerHTML = `<div class="error-message">❌ 无法读取词典列表文件 dicts.txt<br><span style="font-size:0.8rem;">${escapeHtml(err.message)}</span><br><br>💡 请确保项目根目录下存在 dicts.txt 文件，且每行填写一个位于 dicts/ 文件夹下的 .txt 文件名</div>`;
            statsInfoSpan.innerHTML = '列表缺失';
            currentDictDisplaySpan.innerText = '无';
        }
    }
    
    // 防抖搜索
    function onSearchInput() {
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => {
            currentSearchKeyword = searchInput.value;
            renderContent();
        }, SEARCH_DEBOUNCE_DELAY);
    }
    
    function resetSearch() {
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchInput.value = '';
        currentSearchKeyword = '';
        renderContent();
        searchInput.focus();
    }
    
    // 快捷键 Ctrl+K / Cmd+K 聚焦搜索
    function handleGlobalKeydown(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            searchInput.focus();
        }
        // ESC 清空搜索
        if (e.key === 'Escape' && document.activeElement === searchInput) {
            resetSearch();
        }
    }
    
    // 移动端侧边栏控制
    function toggleSidebar() {
        sidebar.classList.toggle('open');
    }
    
    function closeSidebarOnClickOutside(e) {
        if (window.innerWidth <= 720 && sidebar.classList.contains('open')) {
            if (!sidebar.contains(e.target) && !menuToggleBtn.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        }
    }
    
    function bindEvents() {
        searchInput.addEventListener('input', onSearchInput);
        clearSearchBtn.addEventListener('click', resetSearch);
        menuToggleBtn.addEventListener('click', toggleSidebar);
        document.body.addEventListener('click', closeSidebarOnClickOutside);
        window.addEventListener('resize', () => {
            if (window.innerWidth > 720 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });
        document.addEventListener('keydown', handleGlobalKeydown);
    }
    
    async function init() {
        bindEvents();
        await loadDictList();
    }
    
    init();
</script>
</body>
</html>
